name: release

# Mirrors a build that the PRIVATE `code` repo uploaded to the (private) R2
# bucket into a PUBLIC GitHub Release here, so anyone can download the packages
# without auth. R2 is read with credentials (the bucket stays private); the
# Release itself is public because this repo is public.
#
# Required repo secrets (Settings → Secrets and variables → Actions) — same
# values as the code repo / web3 backup.yml:
#   R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT, R2_BUCKET
#
# Flow: in the `code` repo push `code-v0.1.0` (builds + uploads to R2 under
# code-pkg/v0.1.0/), then here push the matching `v0.1.0` tag to publish it:
#   git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to mirror from R2 (e.g. v0.1.0 or latest)'
        required: true
        default: latest

permissions:
  contents: write   # create the public Release + upload assets

jobs:
  mirror:
    name: mirror R2 -> public Release
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      # tag run -> the tag (v0.1.0); manual run -> the chosen input.
      VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - name: Download packages from R2 (private bucket, with credentials)
        run: |
          set -euo pipefail
          pip install awscli
          mkdir -p dist
          echo "Pulling s3://${R2_BUCKET}/code-pkg/${VERSION}/"
          aws s3 cp "s3://${R2_BUCKET}/code-pkg/${VERSION}/" dist/ \
            --recursive --endpoint-url="$R2_ENDPOINT" --no-progress
          # Keep only the installable packages in the Release assets.
          rm -f dist/manifest.txt dist/docs.tar.gz
          echo "----- assets to publish -----"; ls -lh dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # tag run -> the tag (v0.1.0); manual run -> the chosen version.
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: ${{ github.event.inputs.version || github.ref_name }}
          # manual/dev mirrors are marked pre-release.
          prerelease: ${{ github.ref_type != 'tag' }}
          files: dist/*
          fail_on_unmatched_files: true
          body: |
            Built from the private `code` source and mirrored from Cloudflare R2.

            **Linux 直接下载(免登录):**
            ```bash
            # 服务端 (Debian/Ubuntu) —— 具体文件名见下方 Assets
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/<package-name>.deb
            sudo dpkg -i <package-name>.deb
            ```
            Docker: `podman pull ghcr.io/${{ github.repository_owner }}/16code:${{ github.ref_name }}`
